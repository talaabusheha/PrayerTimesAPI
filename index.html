<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
       * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background: linear-gradient(45deg, #240165, #05001c);
    font-family: "Tajawal", sans-serif;
    overflow-x: hidden;
}

/* Header */
#city-name {
    color: white;
    font-size: clamp(45px, 14vw, 150px);
    font-weight: 400;
    line-height: 1.1;
}

#date {
    font-size: clamp(20px, 4vw, 40px) !important;
    font-weight: 200;
}

hr {
    margin: 20px clamp(15px, 5vw, 50px);
    border-color: #5200e1;
}

/* General center */
.center {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Cards container - this targets the div after hr */
hr + .center {
    width: 100% !important;
    max-width: 1300px;
    height: auto !important;
    margin: 50px auto 0 auto !important;
    padding: 0 20px;
    display: grid !important;
    grid-template-columns: repeat(6, 1fr);
    gap: 18px;
    justify-content: center !important;
    align-items: stretch !important;
}

/* Card */
.card {
    width: 100% !important;
    height: 220px !important;
    background-color: white;
    font-size: 20px;
    box-shadow: 0px 10px 5px rgb(0 0 0 / 30%);
    overflow: hidden;
}

.header {
    background: linear-gradient(45deg, #5709ee, #7a37bf);
    color: white;
}

.header h1 {
    font-weight: 400;
    padding: 8px;
    font-size: clamp(20px, 2.5vw, 30px);
}

.body {
    height: calc(100% - 55px);
}

.time {
    font-size: clamp(32px, 4vw, 60px);
}

/* Select */
#cities-select {
    width: min(300px, 90vw) !important;
    height: 42px !important;
    font-size: clamp(18px, 4vw, 25px) !important;
    background: transparent !important;
    color: white;
    border-radius: 20px;
    font-family: Tajawal;
    padding-right: 8px;
}

/* Laptop */
@media (max-width: 1150px) {
    hr + .center {
        grid-template-columns: repeat(3, 1fr);
        max-width: 850px;
    }
}

/* Tablet */
@media (max-width: 750px) {
    body > div > div > div:first-child {
        margin-right: 20px !important;
        margin-left: 20px !important;
    }

    hr + .center {
        grid-template-columns: repeat(2, 1fr);
        max-width: 520px;
        gap: 15px;
        margin-top: 35px !important;
    }

    .card {
        height: 165px !important;
    }

    .body {
        height: calc(100% - 48px);
    }
}

/* Mobile */
@media (max-width: 480px) {
    body > div > div > div:first-child {
        margin-right: 16px !important;
        margin-left: 16px !important;
    }

    hr + .center {
        grid-template-columns: 1fr;
        max-width: 340px;
        padding: 0 15px;
        gap: 14px;
    }

    .card {
        height: 135px !important;
    }

    .header h1 {
        font-size: 20px;
        padding: 6px;
    }

    .body {
        height: calc(100% - 42px);
    }

    .time {
        font-size: 32px;
    }
}
        
    </style>
</head>
<body dir="rtl">
    <div>
      <div>
        <div style="color: white; margin-right: 40px;">
            <h1 id="city-name">الرياض</h1>
            <h6 style="font-size: 40px;  font-weight: 200" id="date">الجمعة 24 نوفمبر</h6>
        </div>
        <hr>
        <div class="center"style="height: 300px;           justify-content: space-around; margin-top: 80px; ">
            <div class="card">
                <div class="header">
                  <h1>الفجر</h1>
                </div>
                <div class="body center">
                    <h1 id="fajr-time" class="time">
                        4:30
                    </h1>
                </div>
            </div>
            <div class="card">
                <div class="header">
                  <h1>الشروق</h1>
                </div>
                <div class="body center">
                    <h1 id="sunrise-time" class="time">
                        4:30
                    </h1>
                </div>
            </div>
            <div class="card">
                <div class="header">
                  <h1>الظهر</h1>
                </div>
                <div class="body center">
                    <h1  id="dhurh-time" class="time">
                        4:30
                    </h1>
                </div>
            </div>
            <div class="card">
                <div class="header">
                  <h1 >العصر</h1>
                </div>
                <div class="body center">
                    <h1 id="asr-time" class="time">
                        4:30
                    </h1>
                </div>
            </div>
            <div class="card">
                <div class="header">
                  <h1 >المغرب</h1>
                </div>
                <div class="body center">
                    <h1 id="sunset-time" class="time">
                        4:30
                    </h1>
                </div>
            </div>
            <div class="card">
                <div class="header">
                  <h1 >العشاء</h1>
                </div>
                <div class="body center">
                    <h1 id="isha-time" class="time">
                        4:30
                    </h1>
                </div>
            </div>
        </div>

        <div class="center" style="margin-top:50px; margin-bottom: 50px;">
        <select name="" id="cities-select" style="width:300px; height:40px;font-size:25px; background:none; color: white; border-radius:20px; font-family:Tajawal; background:none; padding-right: 5px;">
        </select>
        </div>
      </div>  
        
    </div>
</body>
<script src="../node_modules/axios/dist/axios.min.js"></script>
<script>
let cities =[
    {
        arabicName :"الرياض",
        name : "Ar Riyāḑ"
    },
    {
        arabicName :"مكة المكرمة",
        name : "Makkah al Mukarramah"
    },{
        arabicName :"جازان",
        name : "Jāzān"
    },
]
for(city of cities){
    const content=`
    <option style="color: black;">${city.arabicName}</option>`
    document.getElementById("cities-select").innerHTML+=content;
} 
// event listener for select change
document.getElementById("cities-select").addEventListener("change",function (){
    document.getElementById("city-name").innerHTML=this.value;
    
    let cityName=""
    for(let city of cities){
        if(city.arabicName==this.value){
            cityName=city.name;
        }
    }
    getPrayerTimesOfCity(cityName);
    
})

function getPrayerTimesOfCity(cityName){
    let params={
    country :"SA",
    city : cityName
}

axios.get("https://api.aladhan.com/v1/timingsByCity",{
    params : params

})
  .then((response) => {
    const timimgs = response.data.data.timings;
    fillTimeForPrayer("fajr-time",timimgs.Fajr);
    fillTimeForPrayer("sunrise-time",timimgs.Sunrise);
    fillTimeForPrayer("dhurh-time",timimgs.Dhuhr);
    fillTimeForPrayer("asr-time",timimgs.Asr);
    fillTimeForPrayer("sunset-time",timimgs.Maghrib);
    fillTimeForPrayer("isha-time",timimgs.Isha);

    const readableDate=response.data.data.date.readable;
    const Weekday=response.data.data.date.hijri.weekday.ar;
    document.getElementById("date").innerHTML=Weekday+" "+readableDate;
    console.log(readableDate,Weekday)  })
  .catch((error) => {
    console.error(error);
  })
}
getPrayerTimesOfCity("Ar Riyāḑ"); 
  function fillTimeForPrayer(id,time){
    document.getElementById(id).innerHTML = time;
}

</script>
</html>
